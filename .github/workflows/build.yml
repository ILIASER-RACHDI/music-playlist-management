name: build and sonar & run tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      APP_NAME: ${{ secrets.APP_NAME }}
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: playlist_db
      DB_USERNAME: playlist_user
      DB_PASSWORD: playlist_password
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRATION_MINUTES: ${{ secrets.JWT_EXPIRATION_MINUTES }}
      SWAGGER_PATH: ${{ secrets.SWAGGER_PATH }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: playlist_db
          POSTGRES_USER: playlist_user
          POSTGRES_PASSWORD: playlist_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U playlist_user -d playlist_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and run tests
        run: mvn clean verify

      - name: SonarCloud analysis
        if: env.SONAR_TOKEN != ''
        run: mvn sonar:sonar
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
